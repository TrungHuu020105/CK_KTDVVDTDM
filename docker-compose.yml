services:
  iot_backend:
    build:
      context: .
      dockerfile: iot_backend/Dockerfile
    container_name: metricspulse-iot-backend
    restart: unless-stopped
    env_file:
      - ./iot_backend/.env
    extra_hosts:
      - "host.docker.internal:host-gateway"

  app:
    build:
      context: .
      dockerfile: app/Dockerfile
    container_name: metricspulse-app
    restart: unless-stopped
    env_file:
      - ./app/.env
    depends_on:
      iot_backend:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      IOT_BACKEND_URL: http://iot_backend:8100

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_USE_SAME_ORIGIN_API: "true"
    container_name: metricspulse-frontend
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "2026:2026"
