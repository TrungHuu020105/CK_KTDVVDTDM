version: '3.8'

services:
  # MQTT Broker - Mosquitto
  mosquitto:
    image: eclipse-mosquitto:latest
    container_name: mosquitto-broker
    restart: always
    ports:
      - "1883:1883"   # Cổng kết nối MQTT chuẩn
      - "9001:9001"   # Cổng cho MQTT over WebSockets
    volumes:
      # Mount file cấu hình (Cực kỳ quan trọng để cho phép kết nối từ bên ngoài vào container)
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
    environment:
      - TZ=Asia/Ho_Chi_Minh
    networks:
      - iot-network

networks:
  iot-network:
    driver: bridge